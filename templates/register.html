<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t("register_title") }} — RemindMe</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='public.css') }}">
</head>
<body class="public-body">

<div class="auth-page">

    <div class="auth-photo-side">
        <img
            src="{{ url_for('static', filename='images/auth/register.jpg') }}"
            alt="Friends working together"
            loading="eager"
        >

        <div class="auth-photo-caption">
            <p>{{ t("register_caption") }}</p>
            <span>RemindMe</span>
        </div>
    </div>

    <div class="auth-form-side">

        <a href="/" class="site-logo">Remind<em>Me</em></a>

        <h1>{{ t("register_h1") }}</h1>
        <p class="lead">{{ t("register_lead") }}</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">

            <div class="auth-field">
                <label for="username">{{ t("register_username") }}</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="მაგ: ნინო"
                    required
                    autocomplete="username">
            </div>

            <div class="auth-field">
                <label for="email">{{ t("register_email") }}</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="name@example.com"
                    required
                    autocomplete="email">
            </div>

            <div class="auth-field">
                <label for="password">{{ t("register_password") }}</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="{{ t('register_password_hint') }}"
                    required
                    minlength="6"
                    autocomplete="new-password">
            </div>

            <button type="submit" class="btn-warm">
                {{ t("register_btn") }}
            </button>

        </form>

        <p class="auth-switch">
            {{ t("register_have_account") }}
            <a href="/login">{{ t("register_login_link") }}</a>
        </p>

    </div>

</div>

<div class="lang-switcher lang-public">
    {% for code in supported_langs %}
    <a href="/lang/{{ code }}"
       class="lang-btn {% if current_lang == code %}active{% endif %}">
        {{ code.upper() }}
    </a>
    {% endfor %}
</div>

</body>
</html>
